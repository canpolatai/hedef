    showToast('Yanlış kartları tekrar ediyorsun!', '');
  }
  var card = examQueue[0];
  var done = examTotal - examQueue.length;
  var pct = Math.round(done / examTotal * 100);
  var tagLabel = (TOPICS[card.topic] ? TOPICS[card.topic].label : 'Genel').toUpperCase();
  
  var showBack = examModeType === 'flip' || (examModeType === 'random' && Math.random() > 0.5);

function flipCard(id) {
  var el = document.getElementById(id);

async function examAnswer(isCorrect) {
  var card = examQueue.shift();
  if (isCorrect) {
    examCorrect++;
    await recordStat(card.id, true);
    if (examMode === 'error') await removeFromWrongPool(card.id);
  } else {
    await recordStat(card.id, false);
    if (examMode === 'exam' || examMode === 'error') {
      examWrong.push(card);
      await addToWrongPool(card);
    }
  }
  renderExamRun();
}

function renderIstatistik() {
  setTopBar('İstatistik', 'Konu bazlı başarı', false);
  var ca = document.getElementById('content-area');
  var totalCorrect = Object.values(statsMap).reduce((s,v)=>s+v.correct,0);
  var totalWrong = Object.values(statsMap).reduce((s,v)=>s+v.wrong,0);
  var totalAnswered = totalCorrect + totalWrong;
  var rate = totalAnswered > 0 ? Math.round(totalCorrect/totalAnswered*100) : 0;
  
  var html = `<div class="stat-grid">
    <div class="stat-card"><div class="stat-number">${allCards.length}</div><div class="stat-label">Toplam Kart</div></div>
    <div class="stat-card"><div class="stat-number" style="color:var(--green)">${totalCorrect}</div><div class="stat-label">Doğru</div></div>
    <div class="stat-card"><div class="stat-number" style="color:var(--red)">${totalWrong}</div><div class="stat-label">Yanlış</div></div>
  </div>
  <div class="stat-card" style="margin-bottom:16px;padding:16px 20px;display:flex;align-items:center;gap:16px;">
    <div style="flex:1">
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;">Genel Başarı</div>
      <div class="progress-bar" style="height:10px;margin-bottom:6px;"><div class="progress-fill" style="width:${rate}%"></div></div>
      <div style="font-size:12px;color:var(--text2);">${totalAnswered} kart çalışıldı</div>
    </div>
    <div style="font-family:'Fraunces',serif;font-size:36px;font-weight:900;color:var(--accent);">${rate}%</div>
  </div>
  <div class="section-title">Konu Bazlı</div>`;
  
  Object.keys(TOPICS).forEach(t => {
    var cards = allCards.filter(c => c.topic === t);
    var ts = cards.map(c => statsMap[c.id]).filter(Boolean);
    var tc = ts.reduce((a,v)=>a+v.correct,0);
    var tw = ts.reduce((a,v)=>a+v.wrong,0);
    var ta = tc+tw;
    var tr = ta > 0 ? Math.round(tc/ta*100) : null;
    var rateClass = tr === null ? '' : tr >= 70 ? '' : tr >= 40 ? 'mid' : 'low';
    html += `<div class="topic-stat-item">
      <div class="topic-stat-row">
        <div class="topic-stat-name">${TOPICS[t].icon} ${TOPICS[t].label}</div>
        <div class="topic-stat-rate ${rateClass}">${tr !== null ? tr+'%' : '—'}</div>
      </div>
      <div>
        <div class="progress-bar" style="height:5px;"><div class="progress-fill" style="width:${tr||0}%;background:${tr===null?'var(--border)':tr>=70?'var(--green)':tr>=40?'var(--accent)':'var(--red)'}"></div></div>
        <div style="font-size:10px;color:var(--text3);margin-top:5px;font-family:'JetBrains Mono',monospace;">${cards.length} kart · ${ta > 0 ? tc+'✅ '+tw+'❌' : 'Henüz çalışılmadı'}</div>
      </div>
    </div>`;
  });
  
  if (totalAnswered > 0) {
    html += `<button class="form-btn danger" style="margin-top:8px;" onclick="confirmResetStats()">🗑 İstatistikleri Sıfırla</button>`;
  }
  ca.innerHTML = html;
}

async function saveNewCard() {
  var topic = document.getElementById('add-topic').value;

  var tip = document.getElementById('add-tip').value.trim();

  if (allCards.some(c => c.q.toLowerCase() === q.toLowerCase())) { showToast('Bu soru zaten var!', 'error'); return; }
  var card = {id:'u_'+Date.now(), topic, q, a, tip};
  customCards.push(card);
  allCards = [...DEFAULT_CARDS, ...customCards];
  await saveCard(card);
  document.getElementById('add-q').value = '';
  document.getElementById('add-a').value = '';
  document.getElementById('add-tip').value = '';

async function backupData() {
  var data = {
    version:'2.0',
    exportedAt: new Date().toISOString(),
    customCards,
    stats: Object.values(statsMap),
    wrongPool: Object.values(wrongPool)
  };
  var jsonStr = JSON.stringify(data);
  data.checksum = simpleHash(jsonStr);
  var finalStr = JSON.stringify(data, null, 2);
  var blob = new Blob([finalStr], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var d = new Date(); var dStr = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  a.href = url; a.download = `kpss_yedek_${dStr}.json`; a.click();
  URL.revokeObjectURL(url);
  showToast('Yedek alındı!', 'success');
}

function showRestoreModal() {
  openModal(`
    <div class="modal-title">📥 Yedeği Geri Yükle</div>
    <div class="modal-sub">JSON yedek dosyasını seç. Mevcut verilerle merge edilecek, veri kaybı olmayacak.</div>
    <input type="file" id="restore-file" accept=".json" style="display:none" onchange="handleRestoreFile(this)">
    <div class="modal-actions">
      <button class="form-btn primary" style="margin-top:0;" onclick="document.getElementById('restore-file').click()">📁 Dosya Seç</button>
      <button class="form-btn secondary" style="margin-top:0;" onclick="closeModal()">İptal</button>
    </div>`);
}

function handleRestoreFile(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = async function(e) {
    try {
      var data = JSON.parse(e.target.result);
      var {checksum, ...dataWithoutChecksum} = data;
      var expectedHash = simpleHash(JSON.stringify(dataWithoutChecksum));
      if (checksum && checksum !== expectedHash) {
        showToast('⚠️ Checksum hatası! Dosya bozuk olabilir.', 'error');
        closeModal();
        return;
      }
      await mergeRestore(data);
      showToast('Yedek başarıyla yüklendi!', 'success');
      closeModal();
    } catch(err) {
      showToast('Dosya okunamadı!', 'error');
      closeModal();
    }
  };
  reader.readAsText(file);
}

async function mergeRestore(data) {
  // Custom cards merge (yeni kartları ekle, varları güncelle)
  if (data.customCards) {
    for (var c of data.customCards) {
      if (!customCards.find(cc => cc.id === c.id)) {
        customCards.push(c);
        await dbPut(STORES.CARDS, c);
      }
    }
  }
  // Stats merge (her ikisini topla)
  if (data.stats) {
    for (var s of data.stats) {
      if (!statsMap[s.id]) statsMap[s.id] = {id:s.id, correct:0, wrong:0};
      statsMap[s.id].correct = Math.max(statsMap[s.id].correct, s.correct||0);
      statsMap[s.id].wrong = Math.max(statsMap[s.id].wrong, s.wrong||0);
      await dbPut(STORES.STATS, statsMap[s.id]);
    }
  }
  // Wrong pool merge
  if (data.wrongPool) {
    for (var w of data.wrongPool) {
      if (!wrongPool[w.id]) {
        wrongPool[w.id] = w;
        await dbPut(STORES.WRONG, w);
      }
    }
  }
  allCards = [...DEFAULT_CARDS, ...customCards];
  updateHataBadge();
}

function confirmClearAll() {
  openModal(`
    <div class="modal-title" style="color:var(--red)">⚠️ Tüm Verileri Sil</div>
    <div class="modal-sub">İstatistiklerin, yanlış kartların ve özel kartların tamamı silinecek. Bu işlem geri alınamaz!</div>
    <div class="modal-actions">
      <button class="form-btn danger" style="margin-top:0;" onclick="doClearAll()">Evet, Hepsini Sil</button>
      <button class="form-btn secondary" style="margin-top:0;" onclick="closeModal()">İptal</button>
    </div>`);
}
async function doClearAll() {
  await Promise.all([dbClear(STORES.CARDS), dbClear(STORES.STATS), dbClear(STORES.WRONG)]);
  customCards = []; statsMap = {}; wrongPool = {};
  allCards = [...DEFAULT_CARDS];
  closeModal();
  updateHataBadge();
  showToast('Tüm veriler silindi', 'success');
  renderAyarlar();
}

function showAbout() {
  openModal(`
    <div class="modal-title">KPSS Bilgi Kartları</div>
    <div class="modal-sub" style="line-height:1.7;">
      Versiyon 2.0<br>
      <strong>${DEFAULT_CARDS.length}</strong> varsayılan kart<br>
      <strong>${customCards.length}</strong> özel kart<br>
      <strong>${Object.keys(wrongPool).length}</strong> hata havuzunda<br><br>
      IndexedDB tabanlı offline depolama<br>
      JSON yedek — checksum korumalı<br>
      Merge algoritması — veri kaybı yok
    </div>
    <button class="form-btn secondary" style="margin-top:0;" onclick="closeModal()">Kapat</button>`);
}

// ═══════════════════════════════════════════════════════════
// SWIPE (TINDER KAYDIRMA)
// ═══════════════════════════════════════════════════════════
function initSwipe(cardId, mode) {
  var cardEl = document.getElementById(cardId);
  if (!cardEl) return;
  var startX=0, currentX=0, startY=0, startTime=0, isDragging=false;

  cardEl.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startTime = Date.now();
    isDragging = true;
    cardEl.style.transition = 'none';
  }, {passive:true});

  cardEl.addEventListener('touchmove', e => {
    if (!isDragging) return;
    var touchX = e.touches[0].clientX;
    var touchY = e.touches[0].clientY;
    var diffX = touchX - startX;
    var diffY = Math.abs(touchY - startY);
    if (diffY > Math.abs(diffX) && Math.abs(diffX) < 20) {
      isDragging = false; cardEl.style.transform = ''; return;
    }
    currentX = diffX;
    var rotate = currentX * 0.04;
    cardEl.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;
    if (mode === 'exam') {
      var ov = document.getElementById('swipe-overlay');
      if (!ov) {
        ov = document.createElement('div');
        ov.id = 'swipe-overlay'; ov.className = 'swipe-overlay';
        cardEl.querySelector('.flip-card-inner').appendChild(ov);
      }
      ov.style.opacity = Math.min(Math.abs(currentX) / 90, 0.9);
      if (currentX < 0) {
        ov.style.backgroundColor = 'rgba(34,208,122,0.85)';
        ov.innerHTML = '<span style="font-size:40px;font-weight:800;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.4);">✅ DOĞRU</span>';
      } else {
        ov.style.backgroundColor = 'rgba(255,71,87,0.85)';
        ov.innerHTML = '<span style="font-size:40px;font-weight:800;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.4);">❌ YANLIŞ</span>';
      }
    }
  }, {passive:true});

  cardEl.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false;
    var duration = Date.now() - startTime;
    if (Math.abs(currentX) < 15 && duration < 300) {
      cardEl.style.transform = '';
      var ov = document.getElementById('swipe-overlay');
      if (ov) ov.style.opacity = 0;
      cardEl.classList.toggle('flipped');
      currentX = 0; return;
    }
    if (mode === 'exam') {
      if (currentX < -80) {
        cardEl.style.transition = 'all 0.3s ease-out';
        cardEl.style.transform = `translateX(-130vw) rotate(-15deg)`;
        setTimeout(() => examAnswer(true), 280);
      } else if (currentX > 80) {
        cardEl.style.transition = 'all 0.3s ease-out';
        cardEl.style.transform = `translateX(130vw) rotate(15deg)`;
        setTimeout(() => examAnswer(false), 280);
      } else {
        cardEl.style.transition = 'transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275)';
        cardEl.style.transform = '';
        var ov2 = document.getElementById('swipe-overlay');
        if (ov2) ov2.style.opacity = 0;
      }
    } else if (mode === 'topic') {
      if (currentX < -80) {
        cardEl.style.transition = 'all 0.3s ease-out';
        cardEl.style.transform = `translateX(-130vw) rotate(-12deg)`;
        setTimeout(() => { topicIndex = Math.min(topicIndex+1, topicQueue.length-1); renderTopicRun(); }, 250);
      } else if (currentX > 80) {
        cardEl.style.transition = 'all 0.3s ease-out';
        cardEl.style.transform = `translateX(130vw) rotate(12deg)`;
        setTimeout(() => { topicIndex = Math.max(topicIndex-1, 0); renderTopicRun(); }, 250);
      } else {
        cardEl.style.transition = 'transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275)';
        cardEl.style.transform = '';
      }
    }
    currentX = 0;
  });

  // Mouse events for desktop
  var mouseDown = false;
  cardEl.addEventListener('mousedown', e => {
    startX = e.clientX; startY = e.clientY; startTime = Date.now();
    mouseDown = true; isDragging = true; currentX = 0;
    cardEl.style.transition = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!mouseDown || !isDragging) return;
    currentX = e.clientX - startX;
    var diffY = Math.abs(e.clientY - startY);
    if (diffY > Math.abs(currentX) + 20) { mouseDown = false; isDragging = false; cardEl.style.transform=''; return; }
    cardEl.style.transform = `translateX(${currentX}px) rotate(${currentX*0.04}deg)`;
    if (mode === 'exam') {
      var ov = document.getElementById('swipe-overlay');
      if (ov) { ov.style.opacity = Math.min(Math.abs(currentX)/90,0.9); ov.style.backgroundColor = currentX<0?'rgba(34,208,122,0.85)':'rgba(255,71,87,0.85)'; ov.innerHTML = currentX<0?'<span style="font-size:40px;font-weight:800;color:#fff;">✅ DOĞRU</span>':'<span style="font-size:40px;font-weight:800;color:#fff;">❌ YANLIŞ</span>'; }
    }
  });
  document.addEventListener('mouseup', e => {
    if (!mouseDown) return;
    mouseDown = false;
    if (!isDragging) return;
    isDragging = false;
    var duration = Date.now() - startTime;
    if (Math.abs(currentX) < 10 && duration < 250) {
      cardEl.style.transform=''; cardEl.classList.toggle('flipped'); currentX=0; return;
    }
    if (mode === 'exam') {
      if (currentX < -80) { cardEl.style.transition='all 0.3s ease-out'; cardEl.style.transform='translateX(-130vw) rotate(-15deg)'; setTimeout(()=>examAnswer(true),280); }
      else if (currentX > 80) { cardEl.style.transition='all 0.3s ease-out'; cardEl.style.transform='translateX(130vw) rotate(15deg)'; setTimeout(()=>examAnswer(false),280); }
      else { cardEl.style.transition='transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275)'; cardEl.style.transform=''; var ov2=document.getElementById('swipe-overlay'); if(ov2) ov2.style.opacity=0; }
    } else if (mode === 'topic') {
      if (currentX < -80) { cardEl.style.transition='all 0.3s ease-out'; cardEl.style.transform='translateX(-130vw) rotate(-12deg)'; setTimeout(()=>{topicIndex=Math.min(topicIndex+1,topicQueue.length-1);renderTopicRun();},250); }
      else if (currentX > 80) { cardEl.style.transition='all 0.3s ease-out'; cardEl.style.transform='translateX(130vw) rotate(12deg)'; setTimeout(()=>{topicIndex=Math.max(topicIndex-1,0);renderTopicRun();},250); }
      else { cardEl.style.transition='transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275)'; cardEl.style.transform=''; }
    }
    currentX = 0;
  });
}
